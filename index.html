<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>마왕성 마물 도감</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;700&display=swap');
:root{
  --paper:#f2e8c8;--paper2:#e4d4a4;--paper3:#c8aa70;
  --ink:#1a1008;--ink2:#3a2010;--fade:#7a5830;
  --gold:#b88020;--gold2:#d8a840;--goldl:#f0d080;
  --slime:#2a6898;--goblin:#4a7020;--vampire:#782030;
  --undead:#5828a0;--dragon:#886010;--boss:#484040;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;overflow:hidden}
body{font-family:'Noto Serif KR',serif;background:#0a0804;color:var(--ink)}
.bg-blur{position:fixed;inset:0;z-index:0;background-size:cover;background-position:center;filter:blur(18px) brightness(.35) saturate(.6);transform:scale(1.1);transition:background-image .5s}
#pageMain .bg-main{position:absolute;inset:0;z-index:0;background-size:cover;background-position:center;background-image:url('https://raw.githubusercontent.com/ori030/mon/refs/heads/main/%EB%8F%84%EA%B0%90%EB%B6%81.webp')}
.app{position:fixed;inset:0;z-index:1;display:flex;flex-direction:column;overflow:hidden}
/* 탑바 */
.topbar{flex-shrink:0;background:rgba(10,8,4,.88);border-bottom:1px solid var(--gold);backdrop-filter:blur(8px);display:flex;align-items:center;height:48px;overflow-x:auto;scrollbar-width:none;box-shadow:0 2px 12px rgba(0,0,0,.6)}
.topbar::-webkit-scrollbar{display:none}
.tb-btn{flex-shrink:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:5px 10px;cursor:pointer;background:none;border:none;color:var(--fade);font-family:'Noto Serif KR',serif;transition:all .15s;gap:2px;border-bottom:2px solid transparent;height:100%}
.tb-btn:active{background:rgba(176,128,32,.1)}
.tb-btn.active{color:var(--gold2);border-bottom-color:var(--gold)}
.tb-icon{font-size:15px;line-height:1}
.tb-label{font-size:8px;white-space:nowrap}
.tb-sep{width:1px;height:24px;background:rgba(138,96,48,.3);flex-shrink:0;margin:0 2px}
/* 페이지 */
.pages{flex:1;position:relative;overflow:hidden}
.page{position:absolute;inset:0;display:flex;flex-direction:column;overflow:hidden;transform:translateX(100%);opacity:0;transition:transform .28s ease,opacity .28s;pointer-events:none}
.page.active{transform:translateX(0);opacity:1;pointer-events:auto}
/* 메인 */
#pageMain{align-items:center;justify-content:center;gap:18px;padding:24px}
.main-deco{color:var(--gold2);font-size:11px;letter-spacing:8px}
.main-title{font-size:22px;font-weight:700;color:var(--goldl);letter-spacing:4px;line-height:1.35;text-align:center;text-shadow:0 0 20px rgba(216,168,64,.5)}
.main-sub{font-size:9px;color:var(--fade);letter-spacing:5px}
.main-btn{background:rgba(176,128,32,.15);border:2px solid var(--gold2);color:var(--goldl);font-size:13px;font-weight:700;font-family:'Noto Serif KR',serif;padding:11px 28px;cursor:pointer;letter-spacing:3px;clip-path:polygon(0 6px,6px 0,calc(100% - 6px) 0,100% 6px,100% calc(100% - 6px),calc(100% - 6px) 100%,6px 100%,0 calc(100% - 6px));transition:all .2s;box-shadow:0 0 16px rgba(176,128,32,.2)}
.main-btn:active{background:rgba(176,128,32,.3);transform:scale(.96)}
.main-count{font-size:9px;color:var(--fade);letter-spacing:1px}
/* 도감 */
#pageDex{background:transparent}
.dex-header{flex-shrink:0;background:rgba(10,8,4,.72);backdrop-filter:blur(6px);border-bottom:1px solid rgba(138,96,48,.4);padding:6px 10px}
.tribe-tabs{display:flex;gap:4px;overflow-x:auto;scrollbar-width:none}
.tribe-tabs::-webkit-scrollbar{display:none}
.ttab{flex-shrink:0;padding:4px 10px;font-size:9px;background:rgba(255,255,255,.05);border:1px solid rgba(138,96,48,.3);color:var(--fade);cursor:pointer;font-family:'Noto Serif KR',serif;white-space:nowrap;transition:all .15s;clip-path:polygon(0 3px,3px 0,calc(100% - 3px) 0,100% 3px,100% calc(100% - 3px),calc(100% - 3px) 100%,3px 100%,0 calc(100% - 3px))}
.ttab.active{background:rgba(176,128,32,.2);border-color:var(--gold);color:var(--gold2)}
.dex-scroll{flex:1;overflow-y:auto;padding:8px;scrollbar-width:thin;scrollbar-color:rgba(138,96,48,.3) transparent}
.dex-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(80px,1fr));gap:6px}
.gcard{background:var(--paper2);border:2px solid var(--paper3);cursor:pointer;position:relative;overflow:hidden;clip-path:polygon(0 5px,5px 0,calc(100% - 5px) 0,100% 5px,100% calc(100% - 5px),calc(100% - 5px) 100%,5px 100%,0 calc(100% - 5px));transition:transform .12s;box-shadow:0 2px 6px rgba(0,0,0,.4)}
.gcard:active{transform:scale(.92)}
.gc-slime{border-color:var(--slime)}.gc-goblin{border-color:var(--goblin)}.gc-vampire{border-color:var(--vampire)}.gc-undead{border-color:var(--undead)}.gc-dragon{border-color:var(--dragon)}.gc-boss{border-color:var(--boss)}
.gcard-img{width:100%;aspect-ratio:1;display:flex;align-items:center;justify-content:center;padding:4px;background:rgba(255,255,255,.15)}
.gcard-img img{width:100%;height:100%;object-fit:contain;image-rendering:pixelated}
.gcard-name{font-size:7px;color:var(--ink);font-weight:700;text-align:center;padding:2px 2px 3px;border-top:1px solid rgba(0,0,0,.1);background:rgba(255,255,255,.3);line-height:1.3}
.gcard-stage{position:absolute;top:2px;right:2px;font-size:6px;padding:1px 3px;font-weight:700}
.gs1{background:rgba(42,104,152,.3);color:#1a5888;border:1px solid var(--slime)}
.gs2{background:rgba(88,40,160,.3);color:#3a1888;border:1px solid var(--undead)}
.gs3{background:rgba(136,96,16,.3);color:#604808;border:1px solid var(--dragon)}
/* 카드뷰 */
#pageView{background:transparent}
.view-header{flex-shrink:0;background:rgba(10,8,4,.72);backdrop-filter:blur(6px);border-bottom:1px solid rgba(138,96,48,.4);padding:6px 10px;display:flex;align-items:center;gap:8px}
.view-back{background:none;border:1px solid rgba(138,96,48,.4);color:var(--fade);padding:3px 10px;font-size:10px;cursor:pointer;font-family:'Noto Serif KR',serif;clip-path:polygon(0 3px,3px 0,calc(100% - 3px) 0,100% 3px,100% calc(100% - 3px),calc(100% - 3px) 100%,3px 100%,0 calc(100% - 3px))}
.view-name{font-size:13px;font-weight:700;color:var(--goldl)}
.view-info{font-size:9px;color:var(--fade);margin-left:auto}
.view-body{flex:1;overflow:hidden;display:flex;flex-direction:column}
.card-slider{flex:1;display:flex;overflow:hidden;scroll-snap-type:x mandatory;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.card-slider::-webkit-scrollbar{display:none}
.slide-card{flex-shrink:0;width:100%;scroll-snap-align:center;display:flex;flex-direction:column;align-items:center;padding:10px 14px;gap:8px;overflow-y:auto}
/* 슬라이드 카드 본체 */
.sc-wrap{width:100%;max-width:360px;border:2px solid;overflow:hidden;position:relative;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.sc-slime{border-color:var(--slime);background:linear-gradient(160deg,#d8eef8,#b8d4ec)}
.sc-goblin{border-color:var(--goblin);background:linear-gradient(160deg,#d8eec8,#bcd8a8)}
.sc-vampire{border-color:var(--vampire);background:linear-gradient(160deg,#f4d8d8,#e4b8bc)}
.sc-undead{border-color:var(--undead);background:linear-gradient(160deg,#ddd8f8,#c8b8f4)}
.sc-dragon{border-color:var(--dragon);background:linear-gradient(160deg,#f4e8c0,#e8d49c)}
.sc-boss{border-color:var(--boss);background:linear-gradient(160deg,#e8e4e0,#d4ccc8)}
.sc-corner{position:absolute;width:10px;height:10px;border:2px solid}
.sc-corner.tl{top:4px;left:4px;border-right:none;border-bottom:none}
.sc-corner.tr{top:4px;right:4px;border-left:none;border-bottom:none}
.sc-corner.bl{bottom:4px;left:4px;border-right:none;border-top:none}
.sc-corner.br{bottom:4px;right:4px;border-left:none;border-top:none}
.sc-slime .sc-corner{border-color:var(--slime)}.sc-goblin .sc-corner{border-color:var(--goblin)}.sc-vampire .sc-corner{border-color:var(--vampire)}.sc-undead .sc-corner{border-color:var(--undead)}.sc-dragon .sc-corner{border-color:var(--dragon)}.sc-boss .sc-corner{border-color:var(--boss)}
.sc-banner{display:flex;align-items:center;justify-content:space-between;padding:7px 12px 5px;border-bottom:1px solid rgba(0,0,0,.12)}
.tribe-pill{font-size:10px;font-weight:700;padding:2px 9px;clip-path:polygon(4px 0,calc(100% - 4px) 0,100% 4px,100% calc(100% - 4px),calc(100% - 4px) 100%,4px 100%,0 calc(100% - 4px),0 4px)}
.tp-slime{background:var(--slime);color:#fff}.tp-goblin{background:var(--goblin);color:#fff}.tp-vampire{background:var(--vampire);color:#fff}.tp-undead{background:var(--undead);color:#fff}.tp-dragon{background:var(--dragon);color:#fff}.tp-boss{background:var(--boss);color:#fff}
.sb-stage{font-size:9px;padding:2px 7px;font-weight:700}
.ss1{background:rgba(42,104,152,.2);color:var(--slime);border:1px solid var(--slime)}
.ss2{background:rgba(88,40,160,.2);color:var(--undead);border:1px solid var(--undead)}
.ss3{background:rgba(136,96,16,.2);color:var(--dragon);border:1px solid var(--dragon)}
.sc-img-wrap{display:flex;justify-content:center;align-items:center;padding:10px 14px 6px;min-height:165px;position:relative;cursor:pointer}
.sc-img-wrap img{max-height:150px;max-width:100%;object-fit:contain;image-rendering:pixelated;filter:drop-shadow(0 3px 8px rgba(0,0,0,.2))}
.sc-img-wrap::after{content:'';position:absolute;bottom:2px;left:50%;transform:translateX(-50%);width:80px;height:18px;background:radial-gradient(ellipse,rgba(0,0,0,.1),transparent 70%);border-radius:50%}
.sc-info{background:rgba(255,255,255,.5);border-top:1px solid rgba(0,0,0,.1);padding:6px 12px;display:grid;grid-template-columns:1fr 1fr;gap:3px 8px}
.info-pair{display:flex;align-items:center;gap:5px}
.info-k{font-size:8px;color:var(--fade)}
.info-v{font-size:10px;color:var(--ink);font-weight:700}
.role-tag{font-size:8px;padding:1px 5px;font-weight:700}
.rt-딜{background:#ffeeee;color:#992222;border:1px solid #cc3333}.rt-탱{background:#eeeeff;color:#222299;border:1px solid #3333cc}.rt-힐{background:#eeffee;color:#227722;border:1px solid #33aa33}.rt-암살{background:#ffeeff;color:#772277;border:1px solid #aa33aa}.rt-마법{background:#fff3ee;color:#774400;border:1px solid #cc6600}.rt-지원{background:#eeffff;color:#227777;border:1px solid #33aaaa}.rt-군주{background:#fffaee;color:#775500;border:1px solid #aa7700}.rt-보좌관{background:#f4eeff;color:#5522aa;border:1px solid #7744cc}.rt-미정{background:#f0f0f0;color:#555;border:1px solid #999}
.sc-desc{margin:5px 11px;border:1px solid rgba(0,0,0,.1);padding:6px 9px;background-image:radial-gradient(circle,rgba(0,0,0,.04) 1px,transparent 1px),linear-gradient(rgba(255,255,255,.5),rgba(255,255,255,.5));background-size:7px 7px,100%}
.sc-desc-t{font-size:8px;color:rgba(0,0,0,.35);letter-spacing:2px;margin-bottom:3px;display:flex;align-items:center;gap:4px;justify-content:center}
.sc-desc-t::before,.sc-desc-t::after{content:'';flex:1;height:1px;background:rgba(0,0,0,.1)}
.sc-desc-text{font-size:10px;color:#2a1808;line-height:1.7}
.sc-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:3px;padding:0 11px 5px}
.stat-c{text-align:center}
.stat-lbl{font-size:7px;color:var(--fade)}
.stat-bar{height:3px;background:rgba(0,0,0,.08);margin:2px 0;overflow:hidden}
.stat-f{height:100%}
.sf-hp{background:#3a9a55}.sf-atk{background:#bb3333}.sf-def{background:#3366bb}
.stat-num{font-size:9px;font-weight:700;color:var(--ink2)}
.sc-ab{padding:0 11px 8px}
.ab-t{font-size:8px;color:rgba(0,0,0,.35);letter-spacing:2px;margin-bottom:4px;display:flex;align-items:center;gap:4px;justify-content:center}
.ab-t::before,.ab-t::after{content:'';flex:1;height:1px;background:rgba(0,0,0,.1)}
.ab-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:4px}
.ab-item{background:rgba(255,255,255,.5);border:1px solid rgba(0,0,0,.1);padding:5px 2px;text-align:center;cursor:pointer;clip-path:polygon(0 3px,3px 0,calc(100% - 3px) 0,100% 3px,100% calc(100% - 3px),calc(100% - 3px) 100%,3px 100%,0 calc(100% - 3px));transition:all .12s}
.ab-item:active{transform:scale(.94);background:rgba(255,255,255,.8)}
.ab-num{width:14px;height:14px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:7px;font-weight:700;color:#fff;margin:0 auto 2px}
.an-slime{background:var(--slime)}.an-goblin{background:var(--goblin)}.an-vampire{background:var(--vampire)}.an-undead{background:var(--undead)}.an-dragon{background:var(--dragon)}.an-boss{background:var(--boss)}
.ab-name{font-size:7px;color:#333;line-height:1.3}
.sc-evo{padding:0 11px 10px}
.evo-chips{display:flex;gap:4px;flex-wrap:wrap}
.evo-chip{background:rgba(255,255,255,.45);border:1px solid rgba(0,0,0,.1);padding:2px 7px;font-size:8px;color:#333;display:flex;align-items:center;gap:3px;clip-path:polygon(0 3px,3px 0,calc(100% - 3px) 0,100% 3px,100% calc(100% - 3px),calc(100% - 3px) 100%,3px 100%,0 calc(100% - 3px))}
.evo-arr{color:var(--gold);font-weight:700}
.talk-btn{width:100%;max-width:360px;background:rgba(10,8,4,.75);border:1px solid var(--gold);color:var(--gold2);font-size:11px;font-weight:700;font-family:'Noto Serif KR',serif;padding:9px;cursor:pointer;letter-spacing:2px;clip-path:polygon(0 5px,5px 0,calc(100% - 5px) 0,100% 5px,100% calc(100% - 5px),calc(100% - 5px) 100%,5px 100%,0 calc(100% - 5px));transition:all .15s;backdrop-filter:blur(4px)}
.talk-btn:active{background:rgba(176,128,32,.2);transform:scale(.97)}
.nav-dots-wrap{display:flex;justify-content:center;gap:5px;padding:6px 0 2px;flex-shrink:0}
.nav-dot{width:5px;height:5px;border-radius:50%;background:rgba(176,128,32,.2);cursor:pointer;transition:all .15s}
.nav-dot.active{background:var(--gold2);width:14px;border-radius:2px}
/* 말풍선 */
.bubble-wrap{position:fixed;inset:0;z-index:300;display:flex;align-items:flex-end;justify-content:center;padding:0 16px 70px;pointer-events:none}
.bubble{background:rgba(10,8,4,.92);border:1px solid var(--gold);border-radius:8px 8px 8px 0;padding:12px 16px;font-size:12px;color:var(--paper);line-height:1.7;max-width:340px;backdrop-filter:blur(8px);transform:translateY(20px);opacity:0;transition:transform .3s,opacity .3s;pointer-events:auto;box-shadow:0 4px 20px rgba(0,0,0,.5)}
.bubble.show{transform:translateY(0);opacity:1}
/* 이미지 확대 */
.img-ov{position:fixed;inset:0;z-index:400;background:rgba(0,0,0,.9);display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity .2s}
.img-ov.show{opacity:1;pointer-events:auto}
.img-ov img{max-width:90vw;max-height:90vh;object-fit:contain;image-rendering:pixelated;filter:drop-shadow(0 0 20px rgba(176,128,32,.3))}

/* 음악 버튼 */
.music-btn{position:fixed;top:8px;right:10px;z-index:999;background:rgba(10,8,4,.85);border:1px solid var(--gold);color:var(--gold2);width:32px;height:32px;border-radius:50%;cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(6px);transition:all .2s;box-shadow:0 2px 8px rgba(0,0,0,.4)}
.music-btn:active{transform:scale(.92)}
/* 좌우 화살표 버튼 (PC) */
.nav-arrow{display:none;position:absolute;top:50%;transform:translateY(-50%);z-index:50;background:rgba(10,8,4,.75);border:1px solid var(--gold);color:var(--gold2);width:36px;height:60px;cursor:pointer;font-size:20px;backdrop-filter:blur(4px);transition:all .15s;align-items:center;justify-content:center}
.nav-arrow:hover{background:rgba(176,128,32,.2)}
.nav-arrow:disabled{opacity:.2;cursor:default}
.nav-arrow.left{left:8px;border-radius:0 4px 4px 0}
.nav-arrow.right{right:8px;border-radius:4px 0 0 4px}
@media(min-width:640px){.nav-arrow{display:flex}}
/* 툴팁 */
.tooltip{display:none;position:fixed;background:rgba(10,6,2,.97);border:1px solid var(--gold);padding:7px 11px;font-size:10px;color:var(--paper);line-height:1.6;max-width:220px;z-index:500;pointer-events:none;clip-path:polygon(0 4px,4px 0,calc(100% - 4px) 0,100% 4px,100% calc(100% - 4px),calc(100% - 4px) 100%,4px 100%,0 calc(100% - 4px))}
.tooltip.show{display:block}
</style>
</head>
<body>
<div class="bg-blur" id="bg"></div>
<div class="app">
<div class="topbar">
  <button class="tb-btn active" id="tb0" onclick="nav('main',0)"><span class="tb-icon">🏰</span><span class="tb-label">메인</span></button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="tb1" onclick="nav('dex',1)"><span class="tb-icon">📖</span><span class="tb-label">도감</span></button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="tb2" onclick="nav('view',2)"><span class="tb-icon">🃏</span><span class="tb-label">카드뷰</span></button>
  <div class="tb-sep"></div>
  <button class="tb-btn" id="tb3" onclick="fv('slime',3)"><span class="tb-icon">🟢</span><span class="tb-label">슬라임</span></button>
  <button class="tb-btn" id="tb4" onclick="fv('goblin',4)"><span class="tb-icon">⚔️</span><span class="tb-label">고블린</span></button>
  <button class="tb-btn" id="tb5" onclick="fv('vampire',5)"><span class="tb-icon">🧛</span><span class="tb-label">흡혈귀</span></button>
  <button class="tb-btn" id="tb6" onclick="fv('undead',6)"><span class="tb-icon">💀</span><span class="tb-label">언데드</span></button>
  <button class="tb-btn" id="tb7" onclick="fv('dragon',7)"><span class="tb-icon">🐉</span><span class="tb-label">드래곤</span></button>
  <button class="tb-btn" id="tb8" onclick="fv('boss',8)"><span class="tb-icon">👑</span><span class="tb-label">보좌관</span></button>
</div>
<div class="pages">
  <div class="page active" id="pageMain">
    <div class="bg-main"></div>
    <div style="position:relative;z-index:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px;padding:24px;height:100%">
      <div style="text-align:center">
        <div class="main-sub" style="margin-top:60px">DEMON CASTLE MONSTER COMPENDIUM</div>
      </div>
      <button class="main-btn" onclick="nav('view',2)" style="margin-top:auto;font-size:15px;padding:14px 36px;background:rgba(10,8,4,.9);border:2px solid var(--gold2);box-shadow:0 0 20px rgba(176,128,32,.4),inset 0 0 12px rgba(176,128,32,.1)">📖 도감 펼치기</button>
      <div class="main-count" id="mainCount" style="margin-bottom:auto;color:var(--gold2);text-shadow:0 0 8px rgba(176,128,32,.5)"></div>
    </div>
  </div>
  <div class="page" id="pageDex">
    <div class="dex-header">
      <div class="tribe-tabs">
        <div class="ttab active" onclick="st('all',this)">전체</div>
        <div class="ttab" onclick="st('slime',this)">🟢슬라임</div>
        <div class="ttab" onclick="st('goblin',this)">⚔고블린</div>
        <div class="ttab" onclick="st('vampire',this)">🧛흡혈귀</div>
        <div class="ttab" onclick="st('undead',this)">💀언데드</div>
        <div class="ttab" onclick="st('dragon',this)">🐉드래곤</div>
        <div class="ttab" onclick="st('boss',this)">👑보좌관</div>
      </div>
    </div>
    <div class="dex-scroll"><div class="dex-grid" id="dexGrid"></div></div>
  </div>
  <div class="page" id="pageView">
    <div class="view-header">
      <button class="view-back" onclick="nav('main',0)">← 뒤로</button>
      <span class="view-name" id="viewName"></span>
      <span class="view-info" id="viewInfo"></span>
    </div>

function iu(n){return n.startsWith('http')?n:BASE+encodeURIComponent(n+'.webp')}
let vl=[...M],vi=0,dl=[...M];
function updateBg(m){/* 배경 고정: 도감북.webp */}
function resetBg(){document.getElementById('bg').style.backgroundImage=`url('${DOK_URL}')`}
function nav(p,i){
  document.querySelectorAll('.page').forEach(x=>x.classList.remove('active'));
  document.getElementById('page'+p.charAt(0).toUpperCase()+p.slice(1)).classList.add('active');
  document.querySelectorAll('.tb-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('tb'+i).classList.add('active');
  if(p==='dex')rdex();
document.getElementById('bg').style.backgroundImage="url('https://raw.githubusercontent.com/ori030/mon/refs/heads/main/%EB%8F%84%EA%B0%90%EB%B6%81.webp')";
  if(p==='view')rv();
}
function fv(t,i){vl=t==='all'?[...M]:M.filter(m=>m.t===t);vi=0;nav('view',i)}
function st(t,el){dl=t==='all'?[...M]:M.filter(m=>m.t===t);document.querySelectorAll('.ttab').forEach(b=>b.classList.remove('active'));el.classList.add('active');rdex()}
function rdex(){document.getElementById('dexGrid').innerHTML=dl.map(m=>`<div class="gcard gc-${m.t}" onclick="ofd('${m.id}')"><span class="gcard-stage gs${m.s}">${m.s}단계</span><div class="gcard-img"><img src="${iu(m.img)}" loading="lazy"/></div><div class="gcard-name">${m.n}</div></div>`).join('')}
function ofd(id){const i=M.findIndex(m=>m.id===id);vl=[...M];vi=i;nav('view',2)}
function rv(){
  const s=document.getElementById('slider');
  s.innerHTML=vl.map(m=>chtml(m)).join('');
  bdots();scrl(vi,false);uh();updateBg(vl[vi]);
  let sx=0;
  s.ontouchstart=e=>{sx=e.touches[0].clientX};
  s.ontouchend=e=>{const d=e.changedTouches[0].clientX-sx;if(Math.abs(d)>40){if(d<0&&vi<vl.length-1){vi++;scrl(vi,true)}else if(d>0&&vi>0){vi--;scrl(vi,true)}}};
  s.onscroll=()=>{const w=s.offsetWidth;const i=Math.round(s.scrollLeft/w);if(i!==vi&&i>=0&&i<vl.length){vi=i;ud();uh();updateBg(vl[vi])}};
}
function chtml(m){
  const nc=m.hp===0;
  const st=nc?'':
  `<div class="sc-stats">
    <div class="stat-c"><div class="stat-lbl">HP</div><div class="stat-bar"><div class="stat-f sf-hp" style="width:${Math.min(100,m.hp/5)}%"></div></div><div class="stat-num">${m.hp}</div></div>
    <div class="stat-c"><div class="stat-lbl">ATK</div><div class="stat-bar"><div class="stat-f sf-atk" style="width:${Math.min(100,m.atk/0.9)}%"></div></div><div class="stat-num">${m.atk}</div></div>
    <div class="stat-c"><div class="stat-lbl">DEF</div><div class="stat-bar"><div class="stat-f sf-def" style="width:${Math.min(100,m.def/0.5)}%"></div></div><div class="stat-num">${m.def}</div></div>
  </div>`;
  const ev=m.evo.length?`<div class="sc-evo"><div class="ab-t" style="margin-bottom:4px">진화 가능</div><div class="evo-chips">${m.evo.map(e=>`<div class="evo-chip"><span class="evo-arr">→</span>${e}</div>`).join('')}</div></div>`:'';
  return`<div class="slide-card"><div class="sc-wrap sc-${m.t}">
    <div class="sc-corner tl"></div><div class="sc-corner tr"></div><div class="sc-corner bl"></div><div class="sc-corner br"></div>
    <div class="sc-banner"><span class="tribe-pill tp-${m.t}">${TN[m.t]}</span><span class="sb-stage ss${m.s}">${m.s}단계</span></div>
    <div class="sc-img-wrap" onclick="openOv('${iu(m.img)}')"><img src="${iu(m.img)}" loading="lazy"/></div>
    <div class="sc-info">
      <div class="info-pair"><span class="info-k">종족</span><span class="info-v">${m.n}</span></div>
      <div class="info-pair"><span class="info-k">역할</span><span class="info-v"><span class="role-tag rt-${m.r}">${m.r}</span></span></div>
    </div>
    <div class="sc-desc"><div class="sc-desc-t">특징</div><div class="sc-desc-text">${m.desc}</div></div>
    ${st}
    <div class="sc-ab"><div class="ab-t">주요 능력</div>
      <div class="ab-grid">${m.ab.map((a,j)=>`<div class="ab-item" onclick="showTip(event,'${a.d.replace(/'/g,"\\'")}')"><div class="ab-num an-${m.t}">${j+1}</div><div class="ab-name">${a.n}</div></div>`).join('')}</div>
    </div>
    ${ev}
  </div>
  <button class="talk-btn" onclick="talk('${m.id}')">💬 말 걸기</button></div>`;
}
function scrl(i,sm){const s=document.getElementById('slider');s.scrollTo({left:i*s.offsetWidth,behavior:sm?'smooth':'auto'});ud();uh();const al=document.getElementById('arrowL');const ar=document.getElementById('arrowR');if(al)al.disabled=i===0;if(ar)ar.disabled=i===vl.length-1;}
function bdots(){const n=Math.min(vl.length,15);document.getElementById('dots').innerHTML=Array.from({length:n},(_,i)=>`<div class="nav-dot${i===0?' active':''}" onclick="goTo(${i})"></div>`).join('')}
function goTo(i){vi=i;scrl(i,true);updateBg(vl[i])}
function ud(){document.querySelectorAll('.nav-dot').forEach((d,i)=>d.classList.toggle('active',i===vi))}
function uh(){const m=vl[vi];if(!m)return;document.getElementById('viewName').textContent=m.n;document.getElementById('viewInfo').textContent=`${vi+1} / ${vl.length}`}
function talk(id){const m=M.find(x=>x.id===id);if(!m)return;const b=document.getElementById('bubble');b.textContent=m.v[Math.floor(Math.random()*m.v.length)];b.classList.remove('show');requestAnimationFrame(()=>requestAnimationFrame(()=>b.classList.add('show')));clearTimeout(talk._t);talk._t=setTimeout(()=>b.classList.remove('show'),3000)}
function openOv(u){document.getElementById('ovImg').src=u;document.getElementById('imgOv').classList.add('show')}
function closeOv(){document.getElementById('imgOv').classList.remove('show')}
let tt;
function showTip(e,t){const el=document.getElementById('tip');el.textContent=t;el.classList.add('show');const r=e.target.getBoundingClientRect();let top=r.top-65;if(top<8)top=r.bottom+6;el.style.top=top+'px';el.style.left=Math.min(window.innerWidth-230,Math.max(8,r.left))+'px';clearTimeout(tt);tt=setTimeout(()=>el.classList.remove('show'),2500)}
document.addEventListener('click',e=>{if(!e.target.closest('.ab-item'))document.getElementById('tip').classList.remove('show')});

// ── 음악 ──
const bgm=document.getElementById('bgm');
bgm.volume=0.5;
let playing=false;
function toggleMusic(){
  const btn=document.getElementById('musicBtn');
  if(playing){
    bgm.pause();btn.textContent='🔇';btn.title='음악 꺼짐';playing=false;
  } else {
    bgm.play().then(()=>{
      btn.textContent='🎵';btn.title='음악 켜짐';playing=true;
    }).catch(e=>{
      btn.textContent='❌';btn.title='재생 불가 (Pages에서 접속하세요)';
      setTimeout(()=>{btn.textContent='🔇'},2000);
    });
  }
}
// ── 화살표 네비 ──
function arrowNav(d){
  if(d<0&&vi>0){vi--;scrl(vi,true);updateBg(vl[vi])}
  else if(d>0&&vi<vl.length-1){vi++;scrl(vi,true);updateBg(vl[vi])}
  document.getElementById('arrowL').disabled=vi===0;
  document.getElementById('arrowR').disabled=vi===vl.length-1;
}
document.getElementById('mainCount').textContent=`총 ${M.length}종의 마물이 기록되어 있습니다`;
rdex();
document.getElementById('bg').style.backgroundImage="url('https://raw.githubusercontent.com/ori030/mon/refs/heads/main/%EB%8F%84%EA%B0%90%EB%B6%81.webp')";
</script>

<audio id="bgm" loop>
  <source src="https://raw.githubusercontent.com/ori030/mon/refs/heads/main/The%20Demon%27s%20Lullaby.mp3" type="audio/mpeg">
</audio>
<button class="music-btn" id="musicBtn" onclick="toggleMusic()" title="음악 켜기/끄기">🎵</button>
</body>
</html>
